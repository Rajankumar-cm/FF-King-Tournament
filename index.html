<!DOCTYPE html>
<html>
<head>
<title>FF King Tournament</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Poppins&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Poppins;
}

h1{
font-family:Orbitron;
text-align:center;
color:#0ff;
text-shadow:0 0 10px #0ff;
}

.card{
background:#111;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 0 15px #00f;
}

button{
background:linear-gradient(45deg,#00f,#a0f);
border:none;
padding:10px;
color:#fff;
border-radius:8px;
margin-top:5px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border:none;
border-radius:5px;
}

.badge{
padding:5px 10px;
border-radius:5px;
font-size:12px;
}

.live{background:red;}
.upcoming{background:orange;}
.completed{background:green;}
</style>
</head>

<body>

<h1>🔥 FF King Tournament</h1>

<div id="register" class="card">
<h2>Register</h2>
<input id="name" placeholder="Name">
<input id="uid" placeholder="Game UID">
<button onclick="registerUser()">Start Playing</button>
</div>

<div id="app" style="display:none;">
<h2 style="padding-left:10px;">🏆 Tournaments</h2>
<div id="tournaments"></div>
</div>

<script>
const supabase = window.supabase.createClient(
"https://xkowovqimwfenzcazyjf.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhrb3dvdnFpbXdmZW56Y2F6eWpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MTQ1OTUsImV4cCI6MjA5NTk5MDU5NX0.g01xMsRRVia1E27iMxOPgrs_IMRdwTEW_wF-Q_y1hL4"
);

let currentUser = null;

// REGISTER
async function registerUser(){
let {data} = await supabase.from("users").insert([{
name:name.value,
game_uid:uid.value
}]).select();

currentUser = data[0].id;

register.style.display="none";
app.style.display="block";

loadTournaments();
listenRealtime();
}

// LOAD TOURNAMENTS
async function loadTournaments(){
let {data} = await supabase.from("tournaments").select("*");

tournaments.innerHTML="";

for(let t of data){

let {data:joinCheck} = await supabase.from("participants")
.select("*")
.eq("user_id",currentUser)
.eq("tournament_id",t.id);

let joined = joinCheck.length>0;

tournaments.innerHTML += `
<div class="card">
<h3>${t.title}</h3>

<img src="${t.image_url}" width="100%" style="border-radius:10px">

<p>${t.date} | ${t.time}</p>

<p class="badge ${t.status.toLowerCase()}">${t.status}</p>

${t.status==="Live" ? `
<p>🔑 Room ID: ${t.room_id || "Not Set"}</p>
<p>🔐 Password: ${t.room_password || "Not Set"}</p>
` : ""}

${t.status==="Completed" ? `
<p>🏆 Match Completed</p>
` : ""}

<button onclick="join('${t.id}')" ${joined ? "disabled" : ""}>
${joined ? "Joined ✅" : "Join Match"}
</button>

</div>
`;
}
}

// JOIN
async function join(id){
await supabase.from("participants").insert([{
user_id:currentUser,
tournament_id:id
}]);
alert("Joined Successfully 🔥");
loadTournaments();
}

// REALTIME LISTENER
function listenRealtime(){
supabase.channel('realtime')
.on('postgres_changes',{event:'*',schema:'public',table:'tournaments'},payload=>{
loadTournaments();
})
.subscribe();
}
</script>

</body>
</html>
