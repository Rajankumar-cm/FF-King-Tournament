<!DOCTYPE html>
<html>
<head>
<title>User Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#000;color:#fff;font-family:sans-serif}
.card{background:#111;padding:10px;margin:10px;border-radius:10px}
input,button{width:100%;padding:10px;margin:5px 0}
</style>
</head>

<body>

<div id="login">
<input id="uid" placeholder="Enter UID">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<div class="card">
Balance: ₹<span id="bal">0</span>

<input id="amt" placeholder="Deposit">
<input id="utr" placeholder="UTR">
<button onclick="deposit()">Deposit</button>

<input id="wamt" placeholder="Withdraw">
<input id="upi" placeholder="UPI">
<button onclick="withdraw()">Withdraw</button>
</div>

<div class="card">
<h3>History</h3>
<div id="hist"></div>
</div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://xkowovqimwfenzcazyjf.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhrb3dvdnFpbXdmZW56Y2F6eWpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MTQ1OTUsImV4cCI6MjA5NTk5MDU5NX0.g01xMsRRVia1E27iMxOPgrs_IMRdwTEW_wF-Q_y1hL4"
);

let user;

async function login(){
let {data}=await supabase.from("users").select("*").eq("game_uid",uid.value);

if(data.length){
user=data[0].id;
}else{
let {data:newU}=await supabase.from("users").insert([{game_uid:uid.value}]).select();
user=newU[0].id;
}

login.style.display="none";
app.style.display="block";

load();
}

async function load(){
let {data}=await supabase.from("users").select("balance").eq("id",user);
bal.innerText=data[0].balance||0;

let {data:h}=await supabase.from("payments").select("*").eq("user_id",user);
hist.innerHTML="";
h.forEach(x=>hist.innerHTML+=`<div class="card">₹${x.amount} ${x.status}</div>`);
}

async function deposit(){
await supabase.from("payments").insert([{user_id:user,amount:amt.value,utr:utr.value}]);
alert("Sent");
}

async function withdraw(){
let {data}=await supabase.from("users").select("balance").eq("id",user);
let balv=data[0].balance||0;

if(wamt.value>balv){alert("Low");return;}

await supabase.from("users").update({balance:balv-wamt.value}).eq("id",user);

await supabase.from("withdrawals").insert([{user_id:user,amount:wamt.value,upi_id:upi.value}]);

alert("Requested");
}
</script>

</body>
</html>
