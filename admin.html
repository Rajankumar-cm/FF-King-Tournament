<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#000;color:#fff;font-family:sans-serif}
.card{background:#111;padding:10px;margin:10px;border-radius:10px}
input,button{width:100%;padding:10px;margin:5px 0}
</style>
</head>

<body>

<div id="login">
<input id="u" placeholder="Username">
<input id="p" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none">

<div class="card">
<h3>Create Tournament</h3>
<input id="t" placeholder="Title">
<input id="fee" placeholder="Fee">
<button onclick="create()">Create</button>
</div>

<div id="list"></div>

<div class="card">
<h3>Payments</h3>
<div id="payments"></div>
</div>

<div class="card">
<h3>Withdrawals</h3>
<div id="withdrawals"></div>
</div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://xkowovqimwfenzcazyjf.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhrb3dvdnFpbXdmZW56Y2F6eWpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MTQ1OTUsImV4cCI6MjA5NTk5MDU5NX0.g01xMsRRVia1E27iMxOPgrs_IMRdwTEW_wF-Q_y1hL4"
);

async function login(){
let {data}=await supabase.from("admins")
.select("*").eq("username",u.value).eq("password",p.value);

if(data.length){
login.style.display="none";
panel.style.display="block";
loadPayments();
loadWithdrawals();
}else alert("Wrong");
}

async function create(){
await supabase.from("tournaments").insert([{title:t.value,entry_fee:fee.value,status:"Upcoming"}]);
alert("Created");
}

async function loadPayments(){
let {data}=await supabase.from("payments").select("*");
payments.innerHTML="";
data.forEach(p=>{
payments.innerHTML+=`
<div class="card">
₹${p.amount}
<button onclick="approve('${p.id}','${p.user_id}','${p.amount}')">Approve</button>
</div>`;
});
}

async function approve(id,user,amt){
let {data}=await supabase.from("users").select("balance").eq("id",user);
let bal=(data[0].balance||0)+parseInt(amt);

await supabase.from("users").update({balance:bal}).eq("id",user);
await supabase.from("payments").delete().eq("id",id);
loadPayments();
}

async function loadWithdrawals(){
let {data}=await supabase.from("withdrawals").select("*");
withdrawals.innerHTML="";
data.forEach(w=>{
withdrawals.innerHTML+=`
<div class="card">
₹${w.amount}
<button onclick="approveW('${w.id}')">Approve</button>
</div>`;
});
}

async function approveW(id){
await supabase.from("withdrawals").delete().eq("id",id);
loadWithdrawals();
}
</script>

</body>
</html>
